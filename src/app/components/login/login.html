<div class="login-container">
  <div class="login-wrapper">
    <div class="login-header">
      <h1>Inicio de Sesión</h1>
      <p>{{ title | uppercase}}</p>
    </div>

    
    <!-- <form (ngSubmit)="onLogin()" [formGroup]="loginForm" class="login-form" #loginForm="ngForm"> -->


      <!-- formControlName="usuario" esta parte del codigo se retito  al no usar la otra libreria -->
    <form (ngSubmit)="OnSubmit()" class="login-form" #loginForm="ngForm">
      <div class="form-group">
        <label for="usuario" class="form-label">Usuario</label>
        <input
          type="text"
          id="email"
          name="email"
          #emailInput="ngModel"
          [(ngModel)]="solicitud.email"
          class="form-control"
          placeholder="Ingrese su email"
          required
          pattern="^[\w-\.]+@([\w-]+\.)+[\w-]{2,4}$"
        />
        @if (!emailInput.valid && emailInput.touched) {
            <small>El correo electrónico no es válido</small>
        }
        <!-- <div *ngIf="loginForm.get('usuario')?.invalid && loginForm.get('usuario')?.touched" class="error-message">
          Usuario es requerido
        </div> -->
      </div>

      <!-- formControlName="password" esta parte del codigo se retito  al no usar la otra libreria -->

      <div class="form-group">
        <label for="password" class="form-label">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-control"
          placeholder="Ingrese su contraseña"
          #passwordInput="ngModel"
          [(ngModel)]="solicitud.password"
          required
          pattern="^(?=.{8,}$)(?=.*[A-Za-z]).*$"
        />
        @if (!passwordInput.valid && passwordInput.touched) {
            <small>La contraseña no es válida</small>
        }
        <!-- <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="error-message">
          Contraseña es requerida
        </div> -->
      </div>

      <!-- formControlName="recuerda" -->

      <div class="form-group form-check">
        <input
          type="checkbox"
          id="remember"
          class="form-check-input"
        />
        <label class="form-check-label" for="remember">
          Recuérdame
        </label>
      </div>

      <!-- <button type="submit" class="btn-login" [disabled]="loginForm.invalid || isLoading()"> -->
      <button type="submit" class="btn-login" [disabled]="loginForm.invalid">
        <span *ngIf="!isLoading()">Iniciar Sesión</span>
        <span *ngIf="isLoading()" class="spinner-border spinner-border-sm"></span>
      </button>

      <div *ngIf="errorMessage()" class="alert alert-error">
        {{ errorMessage() }}
      </div>

      <div class="login-footer">
        <a href="#" class="link">¿Olvidaste tu contraseña?</a>
      </div>
    </form>
  </div>
</div>
