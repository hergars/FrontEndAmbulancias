
<app-cabecera></app-cabecera>   

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<div class="main-layout">
  <aside class="sidebar">
    <app-navegacion></app-navegacion>
  </aside>

    <div class="form-container">

    <h2>{{ editando ? 'Editar Usuario' : 'Crear Usuario' }}</h2>

        <form [formGroup]="usuarioForm" (ngSubmit)="guardar()" class="form-container">

        <div class="form-row">
            <div class="form-group">
            <i class="fas fa-user"></i>
            <input type="text" formControlName="nombre" placeholder="Nombre">
            </div>

            <div class="form-group">
            <i class="fas fa-user-tag"></i>
            <input type="text" formControlName="apellido" placeholder="Apellido">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
            <i class="fas fa-user-shield"></i>
            <select formControlName="rol">
                <option value="">Rol</option>
                <option value="admin">Administrador</option>
                <option value="editor">Operador</option>
                <option value="medico">Medico</option>
                <option value="auxiliar">Auxiliar</option>
            </select>
            </div>

            <div class="form-group">
            <i class="fas fa-map-marker-alt"></i>
            <input type="text" formControlName="direccion" placeholder="Dirección">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
            <i class="fas fa-mobile-alt"></i>
            <input type="tel" formControlName="celular" placeholder="Celular">
            </div>

            <div class="form-group">
            <i class="fas fa-envelope"></i>
            <input type="email" formControlName="email" placeholder="Email">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group full-width">
            <i class="fas fa-id-card"></i>
            <input type="text" formControlName="licencia" placeholder="Licencia">
            </div>
        </div>

        <button type="submit" class="btn-guardar">
            {{ editando ? 'Actualizar' : 'Crear Usuario' }}
        </button>

        </form>
    <div class="table-container">

    <h2 class="table-title">Usuarios Registrados</h2>

    <table class="custom-table">

        <thead>
        <tr>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Rol</th>
            <th>Dirección</th>
            <th>Celular</th>
            <th>Email</th>
            <th>Licencia</th>
            <th class="acciones-col">Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr *ngFor="let usuario of usuarios; let i = index">
            <td>{{ usuario.nombre }}</td>
            <td>{{ usuario.apellido }}</td>
            <td>
            <span class="badge" [ngClass]="usuario.rol">
                {{ usuario.rol }}
            </span>
            </td>
            <td>{{ usuario.direccion }}</td>
            <td>{{ usuario.celular }}</td>
            <td>{{ usuario.email }}</td>
            <td>{{ usuario.licencia }}</td>
            <td class="acciones">
            <button class="btn-edit" (click)="editar(usuario, i)">
                <i class="fas fa-edit"></i>
            </button>
            <button class="btn-delete" (click)="eliminar(i)">
                <i class="fas fa-trash"></i>
            </button>
            </td>
        </tr>
        </tbody>

    </table>

</div>
    </div>
</div>
<app-pie></app-pie>
