<app-cabecera></app-cabecera>

<div class="main-layout">
  <aside class="sidebar">
    <app-navegacion></app-navegacion>
  </aside>

    <div class="form-container">
    <h2>Crear Vehiculo</h2>
    <form action="/api/vehiculos" method="POST">
        <div class="form-row">
        <div class="form-group">
            <i class="fas fa-id-card"></i>
            <input type="text" name="Placa" placeholder="placa" required>
        </div>
        <div class="form-group">
            <i class="fas fa-key"></i>
            <input type="text" name="Codsecretaria" placeholder="CodSecretaria" required>
        </div>
        <div class="form-group">
            <i class="fas fa-tag"></i>
            <select name="tipo" required>
            <option value="" disabled selected>Tipo</option>
            <option value="admin">Basica</option>
            <option value="editor">Medicalizada</option>
            </select>
        </div>
        </div>
        <div class="form-row">
        <div class="form-group">
            <i class="fas fa-toggle-on"></i>
            <select name="estado" required>
            <option value="" disabled selected>Estado</option>
            <option value="activo">Activo</option>
            <option value="inactivo">Inactivo</option>
            </select>
        </div>
        </div>

        <button type="submit">Crear Vehiculo</button>
    </form>

</div>

<!-- Importar Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</div>
